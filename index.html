<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>520 专属对象领取处 💕</title>
    <style>
        :root {
            --pink: #FF6B9D;
            --pink-light: #FF8FAB;
            --pink-dark: #E8557D;
            --bg-start: #FFF0F5;
            --bg-end: #FFE4EC;
            --white: #FFFFFF;
            --text: #4A3040;
            --text-light: #7A6070;
            --shadow: 0 20px 60px rgba(255, 107, 157, 0.25);
            --shadow-sm: 0 8px 30px rgba(255, 107, 157, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', 'Hiragino Sans GB', -apple-system, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #FFF0F5 0%, #FFE4EC 30%, #FDE2EC 60%, #FFF0F5 100%);
            background-attachment: fixed;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
        }

        /* ==================== 飘落爱心背景 ==================== */
        .hearts-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .falling-heart {
            position: absolute;
            top: -60px;
            animation: fallDown linear infinite;
            opacity: 0.55;
            user-select: none;
            pointer-events: none;
            filter: blur(0.5px);
        }

        @keyframes fallDown {
            0% {
                transform: translateY(-60px) rotate(0deg) scale(1);
                opacity: 0.7;
            }
            15% {
                opacity: 0.55;
            }
            60% {
                opacity: 0.35;
            }
            85% {
                opacity: 0.15;
            }
            100% {
                transform: translateY(105vh) rotate(360deg) scale(0.3);
                opacity: 0;
            }
        }

        /* 个别爱心添加左右摇摆 */
        @keyframes fallSway {
            0% {
                transform: translateY(-60px) translateX(0) rotate(0deg) scale(1);
                opacity: 0.7;
            }
            25% {
                transform: translateY(25vh) translateX(35px) rotate(90deg) scale(0.9);
                opacity: 0.5;
            }
            50% {
                transform: translateY(50vh) translateX(-25px) rotate(180deg) scale(0.7);
                opacity: 0.35;
            }
            75% {
                transform: translateY(75vh) translateX(20px) rotate(270deg) scale(0.5);
                opacity: 0.18;
            }
            100% {
                transform: translateY(105vh) translateX(-10px) rotate(360deg) scale(0.25);
                opacity: 0;
            }
        }

        /* ==================== 主容器 ==================== */
        .main-container {
            position: relative;
            z-index: 1;
            width: 90vw;
            max-width: 480px;
            perspective: 1000px;
        }

        /* ==================== 卡片屏幕 ==================== */
        .screen {
            background: var(--white);
            border-radius: 28px;
            padding: 48px 36px 40px;
            box-shadow: var(--shadow);
            text-align: center;
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        /* 卡片顶部装饰条 */
        .screen::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 5px;
            background: linear-gradient(90deg, #FF6B9D, #FF8FAB, #FFB3C6);
            border-radius: 0 0 10px 10px;
        }

        /* ==================== 界面1：输入界面 ==================== */
        .screen-1 {
            display: block;
        }

        .screen-1.hidden {
            display: none;
        }

        .icon-heart-big {
            font-size: 64px;
            display: block;
            margin-bottom: 8px;
            animation: heartbeat 1.2s ease-in-out infinite;
            user-select: none;
        }

        @keyframes heartbeat {
            0%,
            100% {
                transform: scale(1);
            }
            8% {
                transform: scale(1.18);
            }
            16% {
                transform: scale(1);
            }
            24% {
                transform: scale(1.14);
            }
            32% {
                transform: scale(1);
            }
        }

        .title {
            font-size: 28px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 6px;
            letter-spacing: 2px;
        }

        .title .highlight {
            color: var(--pink);
            font-weight: 800;
        }

        .subtitle {
            font-size: 15px;
            color: var(--text-light);
            margin-bottom: 32px;
            letter-spacing: 1px;
        }

        .input-group {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #FFF5F8;
            border: 2px solid #FFD6E4;
            border-radius: 50px;
            padding: 6px 6px 6px 22px;
            transition: all 0.35s ease;
            position: relative;
        }

        .input-group:focus-within {
            border-color: var(--pink);
            box-shadow: 0 0 0 8px rgba(255, 107, 157, 0.08);
            background: #FFF;
        }

        .input-group.shake {
            animation: shakeInput 0.5s ease;
            border-color: #FF4444 !important;
            background: #FFF5F5 !important;
            box-shadow: 0 0 0 8px rgba(255, 68, 68, 0.08) !important;
        }

        .input-group.success-glow {
            border-color: #4CAF50 !important;
            background: #F6FFF6 !important;
            box-shadow: 0 0 0 12px rgba(76, 175, 80, 0.1) !important;
            transition: all 0.3s ease;
        }

        @keyframes shakeInput {
            0%,
            100% {
                transform: translateX(0);
            }
            15% {
                transform: translateX(-8px);
            }
            30% {
                transform: translateX(8px);
            }
            45% {
                transform: translateX(-6px);
            }
            60% {
                transform: translateX(6px);
            }
            75% {
                transform: translateX(-3px);
            }
            90% {
                transform: translateX(3px);
            }
        }

        .input-prefix {
            font-size: 20px;
            user-select: none;
        }

        .code-input {
            flex: 1;
            border: none;
            background: transparent;
            font-size: 22px;
            font-weight: 600;
            color: var(--text);
            outline: none;
            letter-spacing: 6px;
            text-align: center;
            min-width: 0;
            font-family: inherit;
        }

        .code-input::placeholder {
            color: #D0B8C2;
            letter-spacing: 2px;
            font-weight: 400;
            font-size: 16px;
        }

        .submit-btn {
            flex-shrink: 0;
            background: linear-gradient(135deg, #FF6B9D, #FF4477);
            color: #FFF;
            border: none;
            padding: 14px 28px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            white-space: nowrap;
            font-family: inherit;
            position: relative;
            overflow: hidden;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255, 68, 119, 0.4);
            background: linear-gradient(135deg, #FF7DAD, #FF5588);
        }
        .submit-btn:active {
            transform: scale(0.96);
            transition: transform 0.1s ease;
        }
        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            pointer-events: none;
        }

        /* 按钮波纹 */
        .submit-btn::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.4);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }
        .submit-btn:active::after {
            width: 300px;
            height: 300px;
        }

        .hint-text {
            font-size: 13px;
            color: #C0A0AE;
            margin-top: 18px;
            letter-spacing: 1px;
            transition: color 0.3s;
            min-height: 20px;
        }
        .hint-text.error {
            color: #FF4444;
            font-weight: 600;
        }

        /* ==================== 界面2：结果界面 ==================== */
        .screen-2 {
            display: none;
            padding: 36px 28px 40px;
        }

        .screen-2.visible {
            display: block;
            animation: screenAppear 0.6s cubic-bezier(0.22, 1, 0.36, 1);
        }

        @keyframes screenAppear {
            from {
                opacity: 0;
                transform: translateY(20px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .result-badge {
            display: inline-block;
            background: linear-gradient(135deg, #FF6B9D, #FF8FAB);
            color: #FFF;
            padding: 8px 22px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 3px;
            margin-bottom: 20px;
            animation: badgePop 0.5s 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
        }

        @keyframes badgePop {
            from {
                opacity: 0;
                transform: scale(0.3) translateY(-20px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .result-title {
            font-size: 26px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 4px;
            letter-spacing: 2px;
        }
        .result-subtitle {
            font-size: 14px;
            color: var(--text-light);
            margin-bottom: 28px;
            letter-spacing: 1px;
        }

        /* 图片展示区 - 浮现场所 */
        .image-showcase {
            position: relative;
            display: inline-block;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: var(--shadow-sm);
            /* 浮现动画 */
            animation: floatUpReveal 1s 0.35s cubic-bezier(0.22, 1, 0.36, 1) both;
            background: #FFF5F8;
            max-width: 100%;
        }

        /* 图片光晕 */
        .image-showcase::before {
            content: '';
            position: absolute;
            inset: -4px;
            border-radius: 24px;
            background: linear-gradient(135deg,
                    rgba(255, 107, 157, 0.4),
                    rgba(255, 143, 171, 0.3),
                    rgba(255, 180, 200, 0.25),
                    rgba(255, 143, 171, 0.3),
                    rgba(255, 107, 157, 0.4));
            z-index: -1;
            opacity: 0;
            animation: glowPulse 2s 0.8s ease-in-out infinite;
            filter: blur(12px);
        }

        @keyframes glowPulse {
            0%,
            100% {
                opacity: 0.55;
                transform: scale(1.02);
            }
            50% {
                opacity: 0.85;
                transform: scale(1.06);
            }
        }

        @keyframes floatUpReveal {
            from {
                opacity: 0;
                transform: translateY(70px) scale(0.88);
                filter: blur(4px);
            }
            60% {
                opacity: 0.9;
                transform: translateY(-6px) scale(1.02);
                filter: blur(0);
            }
            80% {
                transform: translateY(3px) scale(0.99);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
                filter: blur(0);
            }
        }

        .result-image {
            display: block;
            max-width: 100%;
            width: 320px;
            height: auto;
            border-radius: 16px;
            position: relative;
            z-index: 1;
        }

        /* 图片下方小装饰 */
        .image-caption {
            margin-top: 16px;
            font-size: 13px;
            color: #B8909E;
            letter-spacing: 2px;
            animation: fadeInUp 0.6s 0.7s ease both;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .restart-btn {
            display: inline-block;
            margin-top: 24px;
            background: transparent;
            border: 2px solid #FFD6E4;
            color: var(--pink-dark);
            padding: 10px 28px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            font-family: inherit;
            animation: fadeInUp 0.6s 0.9s ease both;
        }
        .restart-btn:hover {
            background: #FFF5F8;
            border-color: var(--pink);
            color: #FF4477;
            box-shadow: 0 4px 18px rgba(255, 107, 157, 0.2);
        }

        /* ==================== 响应式 ==================== */
        @media (max-width: 500px) {
            .screen {
                padding: 36px 20px 32px;
                border-radius: 22px;
            }
            .screen-2 {
                padding: 30px 16px 32px;
            }
            .title {
                font-size: 24px;
            }
            .icon-heart-big {
                font-size: 50px;
            }
            .input-group {
                padding: 5px 5px 5px 16px;
                gap: 8px;
            }
            .code-input {
                font-size: 18px;
                letter-spacing: 4px;
            }
            .submit-btn {
                padding: 12px 20px;
                font-size: 14px;
                letter-spacing: 1px;
            }
            .result-image {
                width: 240px;
            }
            .result-title {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>

    <!-- ==================== 飘落爱心容器 ==================== -->
    <div class="hearts-container" id="heartsContainer" aria-hidden="true"></div>

    <!-- ==================== 主容器 ==================== -->
    <div class="main-container">

        <!-- 界面1：暗号输入 -->
        <div class="screen screen-1" id="screen1">
            <span class="icon-heart-big">💝</span>
            <h1 class="title">领取<span class="highlight">专属对象</span></h1>
            <p class="subtitle">输入暗号，解锁你的专属惊喜 ✨</p>

            <div class="input-group" id="inputGroup">
                <span class="input-prefix">🔑</span>
                <input
                type="text"
                class="code-input"
                id="codeInput"
                placeholder="请输入暗号..."
                maxlength="6"
                autocomplete="off"
                inputmode="numeric"
                >
                <button class="submit-btn" id="submitBtn" type="button">确 认</button>
            </div>

            <p class="hint-text" id="hintText">💡 提示：一个特别的三个数字</p>
        </div>

        <!-- 界面2：结果展示 -->
        <div class="screen screen-2" id="screen2">
            <div class="result-badge">🎫 领取成功</div>
            <h2 class="result-title">你的专属对象已送达~</h2>
            <p class="result-subtitle">请好好珍惜 TA 哦 💕</p>

            <div class="image-showcase">
                <!--
                ╔══════════════════════════════════════╗
                ║  📌 替换图片说明：                    ║
                ║  修改下方 src 属性中的图片地址即可    ║
                ║  支持：网址URL / 本地相对路径 /       ║
                ║        base64编码                    ║
                ║  例如：src="./my-photo.jpg"          ║
                ║  或：  src="https://example.com/     ║
                ║             your-image.jpg"          ║
                ╚══════════════════════════════════════╝
                -->
                <img
                class="result-image"
                id="resultImage"
                src="https://picsum.photos/400/400?random=520"
                alt="专属对象"
                loading="lazy"
                >
            </div>

            <p class="image-caption">🌸 缘分已到 · 请签收 🌸</p>

            <button class="restart-btn" id="restartBtn" type="button">🔄 再领一次</button>
        </div>

    </div>

    <script>
        (function() {
            // ==================== DOM 元素 ====================
            const screen1 = document.getElementById('screen1');
            const screen2 = document.getElementById('screen2');
            const codeInput = document.getElementById('codeInput');
            const submitBtn = document.getElementById('submitBtn');
            const inputGroup = document.getElementById('inputGroup');
            const hintText = document.getElementById('hintText');
            const restartBtn = document.getElementById('restartBtn');
            const heartsContainer = document.getElementById('heartsContainer');
            const resultImage = document.getElementById('resultImage');

            // ==================== 配置 ====================
            const CORRECT_CODE = '520'; // 正确的暗号
            const TRANSITION_DELAY = 650; // 界面切换延迟（毫秒），需与CSS动画协调

            // ==================== 自定义图片URL ====================
            //  在这里修改你的图片地址：
            const CUSTOM_IMAGE_URL = 'https://picsum.photos/400/400?random=520';
            // 应用图片URL
            resultImage.src = CUSTOM_IMAGE_URL;

            // ==================== 飘落爱心生成 ====================
            const HEART_SYMBOLS = ['❤️', '💕', '💖', '💗', '💝', '🩷', '🌸', '💐', '✨', '🫧'];
            const TOTAL_HEARTS = 22;

            function createFallingHeart() {
                const heart = document.createElement('span');
                heart.classList.add('falling-heart');
                heart.textContent = HEART_SYMBOLS[Math.floor(Math.random() * HEART_SYMBOLS.length)];
                heart.style.left = Math.random() * 95 + '%';
                heart.style.fontSize = (Math.random() * 22 + 12) + 'px';
                // 随机选择动画类型
                const useSway = Math.random() > 0.55;
                const animName = useSway ? 'fallSway' : 'fallDown';
                const duration = Math.random() * 10 + 8; // 8~18秒
                const delay = Math.random() * 14; // 0~14秒延迟
                heart.style.animationName = animName;
                heart.style.animationDuration = duration + 's';
                heart.style.animationDelay = delay + 's';
                heart.style.animationIterationCount = 'infinite';
                heartsContainer.appendChild(heart);

                // 动画结束后重新定位，保持持续飘落感（可选）
                // 由于设置了infinite，爱心会循环，无需额外处理
            }

            // 初始生成爱心
            for (let i = 0; i < TOTAL_HEARTS; i++) {
                createFallingHeart();
            }

            // 动态补充爱心（当某些爱心动画周期较长时保持密度）
            setInterval(() => {
                const currentHearts = heartsContainer.children.length;
                if (currentHearts < TOTAL_HEARTS + 5) {
                    createFallingHeart();
                }
                // 清理过多的爱心（防止DOM膨胀）
                while (heartsContainer.children.length > TOTAL_HEARTS + 10) {
                    heartsContainer.removeChild(heartsContainer.firstChild);
                }
            }, 4000);

            // ==================== 界面切换逻辑 ====================
            function switchToScreen2() {
                // 界面1添加隐藏类
                screen1.classList.add('hidden');
                // 界面2显示并触发动画
                screen2.classList.add('visible');
                // 滚动到顶部（防止移动端偏移）
                window.scrollTo({ top: 0, behavior: 'smooth' });

                // 短暂延迟后聚焦图片（视觉引导）
                setTimeout(() => {
                    const imageShowcase = screen2.querySelector('.image-showcase');
                    if (imageShowcase) {
                        imageShowcase.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }
                }, 500);
            }

            function switchToScreen1() {
                // 重置界面2
                screen2.classList.remove('visible');
                // 显示界面1
                screen1.classList.remove('hidden');
                // 清空输入
                codeInput.value = '';
                // 重置提示
                hintText.textContent = '💡 提示：一个特别的三个数字';
                hintText.classList.remove('error');
                // 重置输入框样式
                inputGroup.classList.remove('shake', 'success-glow');
                // 聚焦输入框
                setTimeout(() => codeInput.focus(), 300);
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }

            // ==================== 提交验证 ====================
            function handleSubmit() {
                const userInput = codeInput.value.trim();

                // 空输入
                if (userInput === '') {
                    triggerShake();
                    hintText.textContent = '😅 还没输入暗号呢~';
                    hintText.classList.add('error');
                    codeInput.focus();
                    return;
                }

                // 判断是否正确
                if (userInput === CORRECT_CODE) {
                    // ✅ 正确！
                    hintText.textContent = '🎉 暗号正确！正在解锁...';
                    hintText.classList.remove('error');
                    hintText.style.color = '#4CAF50';
                    inputGroup.classList.add('success-glow');
                    submitBtn.disabled = true;
                    submitBtn.textContent = '✅';

                    // 延迟切换界面，让用户看到成功反馈
                    setTimeout(() => {
                        switchToScreen2();
                        // 恢复按钮状态（为重新开始做准备）
                        submitBtn.disabled = false;
                        submitBtn.textContent = '确 认';
                        hintText.style.color = '#C0A0AE';
                        inputGroup.classList.remove('success-glow');
                    }, TRANSITION_DELAY);
                } else {
                    // ❌ 错误
                    triggerShake();
                    hintText.textContent = '❌ 暗号不对哦～再试试吧！';
                    hintText.classList.add('error');
                    // 选中输入内容方便重新输入
                    codeInput.select();
                    codeInput.focus();
                }
            }

            function triggerShake() {
                inputGroup.classList.remove('shake');
                // 强制回流以重新触发动画
                void inputGroup.offsetWidth;
                inputGroup.classList.add('shake');
                // 动画结束后移除class
                setTimeout(() => {
                    inputGroup.classList.remove('shake');
                }, 500);
            }

            // ==================== 事件监听 ====================
            // 按钮点击
            submitBtn.addEventListener('click', handleSubmit);

            // 回车键提交
            codeInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    handleSubmit();
                }
            });

            // 输入时清除错误状态
            codeInput.addEventListener('input', function() {
                if (hintText.classList.contains('error')) {
                    hintText.textContent = '💡 提示：一个特别的三个数字';
                    hintText.classList.remove('error');
                }
                if (inputGroup.classList.contains('shake')) {
                    inputGroup.classList.remove('shake');
                }
                if (inputGroup.classList.contains('success-glow')) {
                    inputGroup.classList.remove('success-glow');
                }
                hintText.style.color = '#C0A0AE';
            });

            // 重新开始按钮
            restartBtn.addEventListener('click', function() {
                switchToScreen1();
            });

            // ==================== 初始聚焦 ====================
            // 页面加载后自动聚焦输入框
            setTimeout(() => {
                codeInput.focus();
            }, 400);

            // ==================== 图片加载失败回退 ====================
            resultImage.addEventListener('error', function() {
                // 如果自定义图片加载失败，显示一个友好的占位提示
                resultImage.src = 'data:image/svg+xml,' + encodeURIComponent(`
                        <svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
                            <rect fill="%23FFF0F5" width="400" height="400" rx="20"/>
                            <text x="200" y="180" text-anchor="middle" font-size="80">💝</text>
                            <text x="200" y="240" text-anchor="middle" font-size="18" fill="%23FF6B9D" font-family="sans-serif">
                                专属对象
                            </text>
                            <text x="200" y="270" text-anchor="middle" font-size="12" fill="%23B8909E" font-family="sans-serif">
                                请替换为你的图片
                            </text>
                        </svg>
                    `);
                console.warn('⚠️ 图片加载失败，已使用占位图。请检查图片URL是否正确：', CUSTOM_IMAGE_URL);
            });

            console.log('💕 520 专属对象领取处已就绪！');
            console.log('📌 当前图片URL：', CUSTOM_IMAGE_URL);
            console.log('💡 修改图片：找到代码中 CUSTOM_IMAGE_URL 变量，替换为你的图片地址即可');
        })();
    </script>
</body>
</html>
